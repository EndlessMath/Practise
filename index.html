<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Endless Maths </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
    /* Custom Pusab Font */
    @font-face {
        font-family: 'Pusab';
        src: url('https://db.onlinewebfonts.com/t/119a933f7ccb7617fa789210e7b9500c.woff2') format('woff2');
    }

    /* --- TOTAL BLACK THEME --- */
    html, body { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        font-family: 'Fredoka', sans-serif; overflow: hidden; 
        background-color: #000000; color: #ffffff; 
        user-select: none; -webkit-user-select: none;
    }
    
    body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

    .title-text { font-family: 'Pusab', sans-serif; font-size: 32px; margin-top: 40px; margin-bottom: 5px; color: #ffffff; text-transform: uppercase; text-align: center; }
    .credit-text { font-size: 14px; margin-bottom: 40px; color: #aaaaaa; text-align: center; font-weight: 500; letter-spacing: 1px;}

    #hubMenu { margin-top: auto; margin-bottom: auto; text-align: center; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

    .menu-btn {
        width: 100%; padding: 20px; background: #000; border: 2px solid #ffffff;
        border-radius: 0; color: white; font-size: 18px; cursor: pointer; text-align: center; transition: 0.2s;
    }
    .menu-btn:hover { background: #ffffff; color: #000; }

    #gameScreen { 
        display: none; width: 100%; height: 100%; flex-direction: column; 
        align-items: center; justify-content: center; position: relative; 
    }
    
    #modeTag { 
        font-size: 16px; margin-bottom: 20px; color: #ffffff; 
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    
    #modeTag select, #modeTag input[type="number"] { 
        background: #000; border: 1px solid #ffffff; border-radius: 4px; 
        padding: 8px; font-family: 'Fredoka'; font-size: 16px; color: #ffffff; outline: none;
    }
    #modeTag input[type="number"] { width: 55px; text-align: center; }

    .switch { position: relative; display: inline-block; width: 50px; height: 26px; vertical-align: middle; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333; transition: .3s; border: 1px solid #ffffff;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 4px; bottom: 3px; background-color: white; transition: .3s;
    }
    input:checked + .slider { background-color: #ffffff; }
    input:checked + .slider:before { transform: translateX(22px); background-color: #000; }

    .game-box { width: 95%; max-width: 500px; text-align: center; }

    .instruction-small { font-size: 16px; opacity: 0.7; min-height: 22px; margin-bottom: 5px; color: #fff; }

    .question { 
        font-size: clamp(60px, 20vw, 120px); font-weight: bold; 
        min-height: 150px; display: flex; align-items: center; justify-content: center; 
        color: #ffffff; margin-bottom: 20px; transition: color 0.2s;
    }
    
    .question sup { font-size: 0.5em; color: inherit; position: relative; top: -25px; }
    
    input#answer {
        font-size: 50px; width: 220px; background: #000; border: none; border-bottom: 4px solid #ffffff;
        color: #ffffff; text-align: center; outline: none; margin-bottom: 30px; border-radius: 0;
    }

    .skip-btn, .hint-btn { background: none; border: 1px solid #444; color: #444; padding: 10px 20px; cursor: pointer; font-family: 'Fredoka'; margin-bottom: 10px; margin-inline: 5px;}
    .skip-btn:hover, .hint-btn:hover { border-color: #fff; color: #fff; }
    
    .finish-game-btn { color: #888; font-size: 12px; cursor: pointer; text-decoration: underline; background: none; border: none; }

    .hud { display: flex; justify-content: space-around; margin-top: 40px; font-size: 1.5rem; }
    .target-box { font-size: 14px; margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; display: flex; justify-content: space-between; }
    
    .back-btn { position: absolute; top: 20px; left: 20px; color: #fff; cursor: pointer; font-size: 18px; z-index: 15; }
    
    #statsOverlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
    }
    .stats-card { text-align: center; width: 85%; }
    .stat-row { display: flex; justify-content: space-between; margin: 20px 0; font-size: 24px; border-bottom: 1px solid #333; }
    .end-btn { margin-top: 40px; padding: 15px 40px; background: #fff; color: #000; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }

    .flex-row { display: flex; gap: 10px; align-items: center; justify-content: center; }
#sessionTimer {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 16px;
        font-weight: 600;
        color: #888;
        z-index: 3000;
        font-family: 'Fredoka', sans-serif;
        background: rgba(0,0,0,0.5);
        padding: 5px 10px;
        border-radius: 5px;
    }
</style>
</head>
<body onload="loadSavedData()">

<div id="sessionTimer">Session: 00:00</div>

    <div id="hubMenu">
        <div class="title-text">Endless Math</div>
        <div class="credit-text">Designed by Pankaj Mehra</div>
        
        <button class="menu-btn" onclick="launch('add')">ADDITION</button>
        <button class="menu-btn" onclick="launch('sub')">SUBTRACTION</button>
        <button class="menu-btn" onclick="launch('table')">TABLES</button>
        <button class="menu-btn" onclick="launch('power')">POWERS</button>
        <button class="menu-btn" onclick="launch('continue')">ADD & CONTINUE</button>
        <button class="menu-btn" onclick="launch('subtract')">KEEP SUBTRACTING</button>
    </div>

    <div id="gameScreen">
        <div class="back-btn" onclick="showHub()">← BACK</div>

        <div class="game-box" id="mainBox">
            <div id="modeTag">
                <div id="rangeControl" class="flex-row">RANGE: <select id="rangePreset" onchange="applySettings()"></select></div>
                <div id="subStartControl" class="flex-row" style="display:none">START: <select id="subStartPreset" onchange="applySettings()">
                    <option value="120">120</option>
                    <option value="1200">1200</option>
                    <option value="12000">12000</option>
                    <option value="120000">120000</option>
                </select></div>
                <div id="customControl" style="display:none">
                    <input type="number" id="minN" value="1" onchange="applySettings()"> TO <input type="number" id="maxN" value="12" onchange="applySettings()">
                </div>
                <div id="powerCustomControl" style="display:none">
                    SQ MAX: <input type="number" id="sqMax" value="30" onchange="applySettings()">
                    CB MAX: <input type="number" id="cbMax" value="15" onchange="applySettings()">
                </div>
                <div id="powerControl" style="display:none">
                    REVERSE: 
                    <label class="switch">
                        <input type="checkbox" id="revToggle" onchange="applySettings()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="top-line" class="instruction-small"></div>
            <div class="question" id="qArea">--</div>
            <div id="bottom-line" class="instruction-small"></div>

            <input type="tel" inputmode="numeric" id="answer" autofocus placeholder="?">
            <br>
            <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">SKIP (S)</button>
            <button class="hint-btn" id="hintBtn" style="display:none" onclick="triggerHint()">HINT</button>
            <br>
            <button class="finish-game-btn" onclick="endGame()">VIEW STATS</button>

            <div class="hud" id="hudArea">
                <div>SCORE: <span id="score">0</span></div>
                <div>TIME: <span id="time">0.0</span>s</div>
            </div>
            <div class="target-box" id="targetArea">
                <div>BEST: <span id="pb">--</span></div>
                <div>GOAL: <span id="goal">--</span></div>
            </div>
        </div>
    </div>

    <div id="statsOverlay">
        <div class="stats-card">
            <h1 id="statTitle" style="font-size: 40px; margin-bottom: 50px;">SESSION OVER</h1>
            <div id="normalStats">
                <div class="stat-row"><span>SCORE</span> <span id="finalScore">0</span></div>
                <div class="stat-row"><span>BEST</span> <span id="finalPB">0</span></div>
            </div>
            <button class="end-btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>

<script>
let totalSeconds = 0;
let sessionInterval;
let mode = 'add', deck = [], priority = [];
let currentQ, currentA, startTime, fastest = Infinity, score = 0, qCount = 0;
let isTransitioning = false, isHintShowing = false;
let lastAskedQuestions = []; 
function startSessionTimer() {
    if (sessionInterval) return;
    sessionInterval = setInterval(() => {
        totalSeconds++;
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        document.getElementById('sessionTimer').innerText = 
            `Session: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }, 1000);
}

// Chain Game variables
let currentTotal = 0, turnNumber = 0, winLimit = 1000;

const specialSub = [
    {q: "0 - 1", a: 9}, {q: "0 - 2", a: 8}, {q: "0 - 3", a: 7}, {q: "0 - 4", a: 6}, {q: "0 - 5", a: 5}, {q: "0 - 6", a: 4}, {q: "0 - 7", a: 3}, {q: "0 - 8", a: 2}, {q: "0 - 9", a: 1},
    {q: "1 - 2", a: 9}, {q: "1 - 3", a: 8}, {q: "1 - 4", a: 7}, {q: "1 - 5", a: 6}, {q: "1 - 6", a: 5}, {q: "1 - 7", a: 4}, {q: "1 - 8", a: 3}, {q: "1 - 9", a: 2},
    {q: "2 - 3", a: 9}, {q: "2 - 4", a: 8}, {q: "2 - 5", a: 7}, {q: "2 - 6", a: 6}, {q: "2 - 7", a: 5}, {q: "2 - 8", a: 4}, {q: "2 - 9", a: 3},
    {q: "3 - 4", a: 9}, {q: "3 - 5", a: 8}, {q: "3 - 6", a: 7}, {q: "3 - 7", a: 6}, {q: "3 - 8", a: 5}, {q: "3 - 9", a: 4},
    {q: "4 - 5", a: 9}, {q: "4 - 6", a: 8}, {q: "4 - 7", a: 7}, {q: "4 - 8", a: 6}, {q: "4 - 9", a: 5},
    {q: "5 - 6", a: 9}, {q: "5 - 7", a: 8}, {q: "5 - 8", a: 7}, {q: "5 - 9", a: 6},
    {q: "6 - 7", a: 9}, {q: "6 - 8", a: 8}, {q: "6 - 9", a: 7},
    {q: "7 - 8", a: 9}, {q: "7 - 9", a: 8}, {q: "8 - 9", a: 7}
];

function saveGameData() {
    const gameData = {
        fastest: fastest,
        priority: priority, // Saves slow questions permanently
        minN: document.getElementById('minN').value,
        maxN: document.getElementById('maxN').value,
        sqMax: document.getElementById('sqMax').value,
        cbMax: document.getElementById('cbMax').value,
        revToggle: document.getElementById('revToggle').checked
    };
    localStorage.setItem('endlessMath_Data', JSON.stringify(gameData));
}

function loadSavedData() {
startSessionTimer(); //
    const saved = localStorage.getItem('endlessMath_Data');
    if (saved) {
        const data = JSON.parse(saved);
        fastest = data.fastest || Infinity;
        priority = data.priority || []; // Reloads slow questions
        
        document.getElementById('minN').value = data.minN || 1;
        document.getElementById('maxN').value = data.maxN || 12;
        document.getElementById('sqMax').value = data.sqMax || 30;
        document.getElementById('cbMax').value = data.cbMax || 15;
        document.getElementById('revToggle').checked = data.revToggle || false;
        
        if (fastest !== Infinity) {
            document.getElementById('pb').innerText = fastest.toFixed(2) + 's';
            document.getElementById('goal').innerText = (fastest * 1.3).toFixed(2) + 's';
        }
    }
}

function launch(newMode) {
    mode = newMode;
    document.getElementById('hubMenu').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'flex';
    setupUI();
    applySettings();
}

function showHub() { location.reload(); }

function setupUI() {
    const sel = document.getElementById('rangePreset');
    sel.innerHTML = '';
    document.getElementById('powerControl').style.display = 'none';
    document.getElementById('subStartControl').style.display = (mode === 'subtract') ? 'flex' : 'none';
    
    const isChainMode = (mode === 'continue' || mode === 'subtract');
    document.getElementById('skipBtn').style.display = isChainMode ? 'none' : 'inline-block';
    document.getElementById('hintBtn').style.display = isChainMode ? 'inline-block' : 'none';
    document.getElementById('hudArea').style.display = isChainMode ? 'none' : 'flex';
    document.getElementById('targetArea').style.display = isChainMode ? 'none' : 'flex';
    
    if (mode === 'add') {
        sel.innerHTML = `<option value="single">1-Digit</option><option value="double">2-Digits</option><option value="custom" selected>Custom</option>`;
    } else if (mode === 'sub') {
        sel.innerHTML = `<option value="single">1-Digit</option><option value="double">2-Digits</option><option value="special">Mastery</option><option value="custom" selected>Custom</option>`;
    } else if (mode === 'table') {
        sel.innerHTML = `<option value="2-9">2-9</option><option value="custom" selected>Custom</option>`;
    } else if (mode === 'power') {
        sel.innerHTML = `<option value="sq">Squares</option><option value="cb">Cubes</option><option value="both" selected>Both</option>`;
        document.getElementById('powerControl').style.display = 'inline-block';
    } else if (mode === 'continue' || mode === 'subtract') {
        sel.innerHTML = `<option value="1" selected>1 Digit</option><option value="2">2 Digit</option><option value="3">3 Digit</option>`;
    }
}

function applySettings() {
    const preset = document.getElementById('rangePreset').value;
    document.getElementById('customControl').style.display = (mode !== 'power' && mode !== 'continue' && mode !== 'subtract' && preset === 'custom') ? 'inline-block' : 'none';
    document.getElementById('powerCustomControl').style.display = (mode === 'power') ? 'inline-block' : 'none';
    saveGameData();
    initGame();
}

function generateChainDeck(digits) {
    let arr = [];
    let min = digits === 1 ? 1 : Math.pow(10, digits - 1);
    let max = Math.pow(10, digits) - 1;
    for (let i = min; i <= max; i++) arr.push(i);
    return arr.sort(() => Math.random() - 0.5);
}

function initGame() {
    deck = []; score = 0; qCount = 0; lastAskedQuestions = [];
    currentTotal = 0; turnNumber = 0;
    document.getElementById('score').innerText = '0';
    document.getElementById('top-line').innerText = '';
    document.getElementById('bottom-line').innerText = '';
    
    const preset = document.getElementById('rangePreset').value;

    if (mode === 'continue' || mode === 'subtract') {
        let m = parseInt(preset);
        if (mode === 'continue') {
            winLimit = [0, 1000, 20000, 200000][m];
            currentTotal = 0;
        } else {
            currentTotal = parseInt(document.getElementById('subStartPreset').value);
        }
        deck = generateChainDeck(m);
    } else if (mode === 'add' || mode === 'sub') {
        let min = parseInt(document.getElementById('minN').value) || 1;
        let max = parseInt(document.getElementById('maxN').value) || 12;
        if (preset === 'single') { min=1; max=9; }
        if (preset === 'double') { min=10; max=99; }
        if (mode === 'sub' && preset === 'special') {
            specialSub.forEach(s => deck.push({q: s.q, a: s.a}));
        } else {
            for(let i=min; i<=max; i++) {
                for(let j=min; j<=(mode === 'add' ? max : i); j++) {
                    if(mode === 'add') deck.push({q: `${i} + ${j}`, a: i+j});
                    else deck.push({q: `${i} - ${j}`, a: i-j});
                }
            }
        }
    } else if (mode === 'table') {
        let min = parseInt(document.getElementById('minN').value) || 1;
        let max = parseInt(document.getElementById('maxN').value) || 12;
        if (preset === '2-9') { min=2; max=9; }
        for(let i=min; i<=max; i++) {
            for(let j=1; j<=10; j++) deck.push({q: `${i} × ${j}`, a: i*j});
        }
    } else if (mode === 'power') {
        let sqMax = parseInt(document.getElementById('sqMax').value) || 30;
        let cbMax = parseInt(document.getElementById('cbMax').value) || 15;
        const isRev = document.getElementById('revToggle').checked;
        if (preset !== 'cb') { 
            for(let i=2; i<=sqMax; i++) {
                let res = i*i;
                deck.push({ q: isRev ? `<div style="display:flex; flex-direction:column; align-items:center;"><span style="font-size: clamp(60px, 20vw, 120px); line-height: 1;">${res}</span><span style="font-size: 20px; color: #aaaaaa; margin-top: 5px;">is square of?</span></div>` : `${i}²`, a: isRev ? i : res });
            }
        }
        if (preset !== 'sq') {
            for(let i=2; i<=cbMax; i++) {
                let res = i*i*i;
                deck.push({ q: isRev ? `<div style="display:flex; flex-direction:column; align-items:center;"><span style="font-size: clamp(60px, 20vw, 120px); line-height: 1;">${res}</span><span style="font-size: 20px; color: #aaaaaa; margin-top: 5px;">is cube of?</span></div>` : `${i}³`, a: isRev ? i : res });
            }
        }
    }
    if (mode !== 'continue' && mode !== 'subtract') deck.sort(() => Math.random() - 0.5);
    nextQ();
}

function nextQ() {
    isTransitioning = false;
    const input = document.getElementById('answer');
    input.value = ''; input.disabled = false; input.focus();
    input.style.color = "white";

    // --- CHAIN MODES ---
    if (mode === 'continue' || mode === 'subtract') {
        if (deck.length === 0) deck = generateChainDeck(parseInt(document.getElementById('rangePreset').value));
        
        if (turnNumber === 0) {
            currentA = mode === 'subtract' ? currentTotal : deck.pop();
            document.getElementById('top-line').innerText = "write";
            document.getElementById('bottom-line').innerText = mode === 'subtract' ? "to start game" : "and start";
            document.getElementById('qArea').innerHTML = currentA;
        } else {
            let nextNum = deck.pop();
            if (mode === 'subtract' && nextNum >= currentTotal) nextNum = currentTotal;
            
            document.getElementById('top-line').innerText = (mode === 'subtract') ? "now subtract" : (turnNumber === 1 ? "add" : "now add");
            document.getElementById('bottom-line').innerText = (turnNumber === 1) ? (mode === 'subtract' ? "from it" : "to previous") : "";
            
            currentA = mode === 'subtract' ? currentTotal - nextNum : currentTotal + nextNum;
            document.getElementById('qArea').innerHTML = nextNum;
        }
        turnNumber++;
        return;
    }

    // --- STANDARD MODES (Add, Sub, Table, Power) ---
    qCount++;

    // 1. REFILL DECK: If deck is empty, re-initialize it to keep the game "Endless"
    if (deck.length === 0) {
        applySettings(); // This regenerates the deck based on current UI settings
        return; 
    }

    let pickedItem = null;
    let validPriority = priority.filter(p => !lastAskedQuestions.includes(p.q));
    
    // 2. SMART SELECTION: Every 3rd question, try to show a "struggle" question
    if (validPriority.length > 0 && qCount % 3 === 0) {
        validPriority.sort((a,b) => b.t - a.t);
        pickedItem = validPriority[0];
    } else {
        // Find first item in deck that hasn't been asked recently
        let deckIdx = deck.findIndex(d => !lastAskedQuestions.includes(d.q));
        
        // If everything in the deck was just asked (rare), just take the first one
        if (deckIdx === -1) deckIdx = 0; 
        
        pickedItem = deck.splice(deckIdx, 1)[0];
    }
    
    // Safety check if pickedItem is still null
    if (!pickedItem) { endGame(); return; }
    
    currentQ = pickedItem.q; 
    currentA = pickedItem.a;

    // Track history to avoid immediate repeats
    lastAskedQuestions.push(currentQ);
    if (lastAskedQuestions.length > 5) lastAskedQuestions.shift();

    document.getElementById('qArea').innerHTML = currentQ;
    document.getElementById('qArea').style.color = "#ffffff";
    startTime = Date.now();
}

function triggerHint() {
    isHintShowing = true;
    const inputField = document.getElementById('answer');
    inputField.value = currentA;
    inputField.style.color = "#ff4444"; 
    setTimeout(() => {
        if(isHintShowing) {
            inputField.value = ""; 
            inputField.style.color = "white";
            inputField.focus();
            isHintShowing = false;
        }
    }, 2000); 
}

function skipQuestion() {
    if (isTransitioning || mode === 'continue' || mode === 'subtract') return;
    isTransitioning = true;
    document.getElementById('qArea').style.color = "#ff4444";
    document.getElementById('qArea').innerHTML = currentA;
    document.getElementById('answer').disabled = true;
    
    if (!priority.some(p => p.q === currentQ)) priority.push({q: currentQ, a: currentA, t: 9.9});
    saveGameData();
    setTimeout(nextQ, 1000); 
}

document.getElementById('answer').addEventListener('input', (e) => {
    if (isTransitioning || e.target.value === "") return;
    
    if (isHintShowing) {
        e.target.style.color = "white";
        isHintShowing = false;
    }

    if (parseInt(e.target.value) === currentA) {
        if (mode === 'continue' || mode === 'subtract') {
            currentTotal = currentA;
            if ((mode === 'continue' && currentTotal >= winLimit) || (mode === 'subtract' && currentTotal <= 0)) {
                endGame();
            } else {
                nextQ();
            }
            return;
        }

        let time = (Date.now() - startTime) / 1000;
        if (time < fastest) {
            fastest = time;
            document.getElementById('pb').innerText = fastest.toFixed(2) + 's';
            document.getElementById('goal').innerText = (fastest * 1.3).toFixed(2) + 's';
        }
        
        let goal = fastest * 1.3;
        let pIdx = priority.findIndex(p => p.q === currentQ);
        
        if (time > goal && fastest !== Infinity) {
            if (pIdx > -1) priority[pIdx].t = time;
            else priority.push({q: currentQ, a: currentA, t: time});
        } else if (pIdx > -1) {
            priority.splice(pIdx, 1);
        }
        
        saveGameData(); // Always save current progress
        score++;
        document.getElementById('score').innerText = score;
        nextQ();
    }
});

function endGame() {
    if (mode === 'continue' || mode === 'subtract') {
        document.getElementById('statTitle').innerText = "FINISH";
        document.getElementById('normalStats').style.display = 'none';
    } else {
        document.getElementById('statTitle').innerText = "SESSION OVER";
        document.getElementById('normalStats').style.display = 'block';
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalPB').innerText = fastest === Infinity ? '--' : fastest.toFixed(2) + 's';
    }
    document.getElementById('statsOverlay').style.display = 'flex';
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('button') && !e.target.closest('select') && !e.target.closest('input')) {
        document.getElementById('answer').focus();
    }
});

window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 's') skipQuestion(); });
setInterval(() => { 
    if (startTime && !isTransitioning && mode !== 'continue' && mode !== 'subtract') 
        document.getElementById('time').innerText = ((Date.now() - startTime) / 1000).toFixed(1); 
}, 100);
</script>
</body>
</html>
